name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: latest
      - name: Build release artifacts
        run: node scripts/release/build-release.js --version "${GITHUB_REF_NAME#v}"
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/Slick-*.zip
            dist/Slick-*.dmg
          generate_release_notes: true
