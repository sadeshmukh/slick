name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    name: ${{ matrix.check }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        check: ['fmt:check', lint, 'lint:sh', validate]
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run ${{ matrix.check }}
