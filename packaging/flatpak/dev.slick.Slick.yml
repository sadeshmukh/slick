id: dev.slick.Slick
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.node22
base: org.electronjs.Electron2.BaseApp
base-version: '25.08'
command: slick
separate-locales: false

build-options:
  append-path: /usr/lib/sdk/node22/bin

finish-args:
  - --share=ipc
  - --share=network
  - --socket=fallback-x11
  - --socket=wayland
  - --socket=pulseaudio
  - --device=all
  - --filesystem=host-os:ro
  - --filesystem=/opt/Slack:ro
  - --filesystem=/opt/slack:ro
  - --filesystem=xdg-data/slack:ro
  - --env=ELECTRON_TRASH=gio
  - --env=XCURSOR_PATH=/run/host/user-share/icons:/run/host/share/icons
  - --talk-name=com.canonical.AppMenu.Registrar
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=org.freedesktop.ScreenSaver
  - --talk-name=org.freedesktop.secrets
  - --talk-name=org.kde.StatusNotifierWatcher
  - --talk-name=org.kde.kwalletd5
  - --talk-name=org.kde.kwalletd6
  - --system-talk-name=org.freedesktop.UPower
  - --system-talk-name=org.freedesktop.login1

modules:
  - name: slick
    only-arches:
      - x86_64
    buildsystem: simple
    build-commands:
      - >-
        node slick/scripts/byoe/build-handoff-linux.js
        --source-dist electron
        --target /app/lib/slick
        --app-version 1.0.58
        --build-number 58
        --force
      - install -Dm755 flatpak/slick.sh /app/bin/slick
      - install -Dm644 flatpak/dev.slick.Slick.desktop /app/share/applications/dev.slick.Slick.desktop
      - install -Dm644 flatpak/dev.slick.Slick.metainfo.xml /app/share/metainfo/dev.slick.Slick.metainfo.xml
      - install -Dm644 slick/assets/icon.png /app/share/icons/hicolor/1024x1024/apps/dev.slick.Slick.png
    sources:
      - type: dir
        path: ../..
        dest: slick
      - type: archive
        url: https://github.com/electron/electron/releases/download/v42.4.1/electron-v42.4.1-linux-x64.zip
        sha256: 1ac0306029b2c95dc5424afff4ab061e9154d8a9ea3bb5a35a7d7166b9245b29
        dest: electron
      - type: file
        path: slick.sh
        dest: flatpak
      - type: file
        path: dev.slick.Slick.desktop
        dest: flatpak
      - type: file
        path: dev.slick.Slick.metainfo.xml
        dest: flatpak
